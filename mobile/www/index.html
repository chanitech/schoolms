<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ShulePRO</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a2a4a;
            color: #fff;
            text-align: center;
        }
        .box { padding: 2rem; }
        h1 { margin-bottom: 0.5rem; }
        p { color: #b8c4d8; }
        button {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 8px;
            background: #3490dc;
            color: #fff;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>ShulePRO</h1>
        <p>Imeshindwa kuunganisha. Tafadhali hakikisha una intaneti kisha ujaribu tena.</p>
        <p>Could not connect. Please check your internet connection and try again.</p>
        <button onclick="window.location.reload()">Jaribu tena / Retry</button>
    </div>
</body>
</html>
